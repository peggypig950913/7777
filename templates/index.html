<!DOCTYPE html>
<html>
<head>
    <title>AI燃脂闖關遊戲</title>
</head>
<body>
    <h1>🔥 AI燃脂闖關遊戲</h1>

    <h2>開合跳：<span id="jump">0</span></h2>
    <h2>深蹲：<span id="squat">0</span></h2>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
